name: Tests

# Required status check para bloquear el merge a master.
# Se dispara en cada PR hacia master (cualquier rama).
# El job `deploy` en deploy.yml también corre estos tests, pero en el push
# post-merge — este archivo es el que la branch protection usa para impedir
# el merge mientras los tests estén en rojo.

on:
  pull_request:
    branches: [master]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/tests.yml"

concurrency:
  group: tests-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Correr tests
        env:
          # Los tests de unit/domain y repositories no pegan contra la DB real,
          # pero igual pasamos defaults seguros por si algún fixture los usa.
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Reportar cobertura
        if: always()
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          python -m pytest tests/ \
            --cov=app/domain \
            --cov=app/personas/use_cases \
            --cov=app/reportes/use_cases \
            --cov=app/shared \
            --cov-report=term-missing
