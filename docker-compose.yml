# Despliegue todo-en-uno en un Droplet de DigitalOcean.
# Levanta Postgres con pgvector + el servicio FastAPI.
# Las claves de Spaces y MATCH_THRESHOLD se leen del archivo .env.
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rostros
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cambia_esta_clave}
      POSTGRES_DB: rostros
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rostros"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    # Conexión interna a la BD del compose; sobrescribe DATABASE_URL del .env.
    environment:
      DATABASE_URL: postgresql://rostros:${DB_PASSWORD:-cambia_esta_clave}@db:5432/rostros
    depends_on:
      db:
        condition: service_healthy
    # Sin exposición directa al host: nginx hace de proxy interno.
    # Para depurar la API directamente, cambia a: ports: ["8000:8000"]
    volumes:
      # Cachea los pesos de InsightFace buffalo_l (~300 MB) entre reinicios.
      - insightface_models:/root/.insightface

volumes:
  pgdata:
  insightface_models:
