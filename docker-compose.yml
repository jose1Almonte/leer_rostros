# Despliegue completo en un solo comando:  docker compose up -d --build
# Levanta: Postgres+pgvector  +  API (FastAPI/DeepFace)  +  nginx (frontend + proxy).
# Solo necesitas un archivo .env (copia de .env.example) con las claves de Spaces.
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: rostros
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rostros}
      POSTGRES_DB: rostros
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rostros"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    # Conexión interna a la BD del compose (sobrescribe DATABASE_URL del .env).
    environment:
      DATABASE_URL: postgresql://rostros:${DB_PASSWORD:-rostros}@db:5432/rostros
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - weights:/weights        # cachea los pesos de DeepFace entre reinicios
    expose:
      - "8000"

  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  weights:
